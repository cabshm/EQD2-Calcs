<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reirradiation EQD2 Calculator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<h1>Reirradiation EQD2 Calculator</h1>

<div class="card">
<h2>OAR Recovery Suggestion</h2>

<label>Organ at Risk</label>
<select id="oar"></select>

<label>Time interval</label>
<select id="interval">
<option value="<3mo"><3 months</option>
<option value="3-6mo">3–6 months</option>
<option value="6mo-1yr">6 months–1 year</option>
<option value="1-3yrs">1–3 years</option>
<option value="More than 3yrs">More than 3 years</option>
</select>

<label>D0.1cc EQD2 limit</label>
<input id="limit">

<label>Recovery factor (%)</label>
<input id="recovery">
</div>

<div class="card">
<h2>EQD2 Calculator</h2>

<label>Dose 1</label>
<input id="dose1" value="50">

<label>Fractions 1</label>
<input id="fx1" value="25">

<label>Dose 2</label>
<input id="dose2" value="30">

<label>Fractions 2</label>
<input id="fx2" value="5">

<label>Alpha/Beta</label>
<input id="ab" value="3">

<h3>Total EQD2</h3>
<div id="result">0</div>
</div>

</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
