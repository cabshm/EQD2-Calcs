
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Re‑irradiation EQD2 Calculator with OAR Recovery</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="container">

<h1>Re‑irradiation EQD2 Calculator</h1>

<div class="card">

<h2>OAR Recovery Suggestion</h2>

<label>Organ at Risk</label>
<select id="oarSelect"></select>

<label>Time interval</label>
<select id="timeSelect">
<option value="<3mo"><3 months</option>
<option value="3-6mo">3–6 months</option>
<option value="6mo-1yr">6 months–1 year</option>
<option value="1-3yrs ">1–3 years</option>
<option value="More than 3yrs">More than 3 years</option>
</select>

<label>D0.1cc EQD2 limit (Gy)</label>
<input id="limit" type="number">

<label>Recovery factor (%)</label>
<input id="recovery" type="number">

</div>

<div class="card">

<h2>EQD2 Calculator</h2>

<label>Course 1 dose (Gy)</label>
<input id="dose1" type="number" value="50">

<label>Course 1 fractions</label>
<input id="fx1" type="number" value="25">

<label>Course 2 dose (Gy)</label>
<input id="dose2" type="number" value="30">

<label>Course 2 fractions</label>
<input id="fx2" type="number" value="5">

<label>Alpha/Beta</label>
<input id="ab" type="number" value="3">

<h3>Total EQD2</h3>
<div id="result">0</div>

</div>

</div>

<script src="app.js"></script>
</body>
</html>
